services:
  - type: web
    name: epc-buildcontrol-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # preencher no dashboard do Render com a URL do Neon
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
