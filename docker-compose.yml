services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: piping
      POSTGRES_PASSWORD: piping
      POSTGRES_DB: piping_cms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/versions/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ../extracted_db:/extracted_db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
